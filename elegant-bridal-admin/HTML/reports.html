<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elegant Bridal - Sales Reports</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../CSS/admin.css" />
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <i class="fas fa-ring"></i>
        <h1>ELEGANT BRIDAL</h1>
      </div>
      <nav class="sidebar-menu">
        <ul>
          <li><a href="admin1.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
          <li><a href="gowns.html"><i class="fas fa-tshirt"></i> Gown Management</a></li>
          <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
          <li><a href="customers.html"><i class="fas fa-users"></i> Customers</a></li>
          <li><a href="suppliers.html"><i class="fas fa-truck"></i> Suppliers</a></li>
          <li><a href="reports.html" class="active"><i class="fas fa-chart-bar"></i> Reports</a></li>
          <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      <header class="admin-header">
        <div class="header-left">
          <h2>Sales Reports</h2>
          <div class="breadcrumb">
            <a href="#">Home</a> / <span>Reports</span>
          </div>
        </div>
      </header>

      <section id="reports" class="tab-content active">
        <div class="content-card">
          <div class="card-header">
            <h3>Sales Overview</h3>
            <div>
              <select id="report-period" class="form-control" style="width: 150px;">
                <option value="7days">Last 7 Days</option>
                <option value="30days">Last 30 Days</option>
              </select>
              <button class="btn btn-primary">Generate</button>
              <button class="btn btn-primary">Export</button>
            </div>
          </div>

         <div class="chart-box small-chart">
  <canvas id="salesChart"></canvas>
</div>

<!-- Category Chart -->
<div class="chart-box small-chart">
  <canvas id="categoryChart"></canvas>
</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Your Reports Script -->
  <script src="../JS/reports.js"></script>
</body>
</html>
