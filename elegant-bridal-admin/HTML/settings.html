<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegant Bridal - Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../CSS/admin.css">
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar Navigation -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <i class="fas fa-rings-wedding"></i>
        <h1>ELEGANT BRIDAL</h1>
      </div>
      
      <nav class="sidebar-menu">
        <ul>
          <li><a href="admin1.html" class="active"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
          <li class="menu-dropdown">
            <a href="gowns.html"><i class="fas fa-tshirt"></i> <span>Gown Management</span></a>
            <ul class="dropdown-content">
              <li><a href="#all-gowns"><i class="fas fa-list"></i> <span>All Gowns</span></a></li>
              <li><a href="#add-gown"><i class="fas fa-plus-circle"></i> <span>Add New Gown</span></a></li>
              <li><a href="#categories"><i class="fas fa-tags"></i> <span>Categories</span></a></li>
              <li><a href="#inventory"><i class="fas fa-boxes"></i> <span>Inventory</span></a></li>
            </ul>
          </li>
          <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
          <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
          <li><a href="suppliers.html"><i class="fas fa-truck"></i> <span>Suppliers</span></a></li>
          <li><a href="reports.html"><i class="fas fa-chart-bar"></i> <span>Reports</span></a></li>
          <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="admin-main">
      <header class="admin-header">
        <div class="header-left">
          <h2 id="page-title">Dashboard Overview</h2>
          <div class="breadcrumb">
            <a href="#">Home</a> / <span id="breadcrumb-current">Dashboard</span>
          </div>
        </div>
        
        <div class="header-right">
          <div class="search-box">
            <input type="text" placeholder="Search..." id="global-search">
            <i class="fas fa-search"></i>
          </div>
          
          <div class="admin-profile">
            <img src="https://randomuser.me/api/portraits/women/65.jpg" alt="Admin">
            <span>Admin User</span>
            <i class="fas fa-caret-down"></i>
          </div>
        </div>
      </header>

        <div id="settings" class="tab-content">
          <div class="content-card">
            <div class="card-header">
              <h3>System Settings</h3>
            </div>
            <form id="settings-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="store-name">Store Name</label>
                  <input type="text" id="store-name" class="form-control" value="Elegant Bridal">
                </div>
                <div class="form-group">
                  <label for="store-email">Store Email</label>
                  <input type="email" id="store-email" class="form-control" value="info@elegantbridal.com">
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="store-phone">Store Phone</label>
                  <input type="tel" id="store-phone" class="form-control" value="+1 234 567 8900">
                </div>
                <div class="form-group">
                  <label for="store-address">Store Address</label>
                  <textarea id="store-address" class="form-control">123 Bridal Avenue, Wedding City</textarea>
                </div>
              </div>
              
              <div class="form-actions">
                <button type="button" class="btn btn-outline">Reset</button>
                <button type="submit" class="btn btn-primary">Save Settings</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Category Modal -->
  <div class="modal" id="category-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add New Category</h3>
        <span class="close">&times;</span>
      </div>
      <form id="category-form">
        <div class="form-group">
          <label for="category-name">Category Name</label>
          <input type="text" id="category-name" class="form-control" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancel-category">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Category</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Supplier Modal -->
  <div class="modal" id="supplier-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add New Supplier</h3>
        <span class="close">&times;</span>
      </div>
      <form id="supplier-form">
        <div class="form-row">
          <div class="form-group">
            <label for="supplier-name">Supplier Name</label>
            <input type="text" id="supplier-name" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="supplier-contact">Contact Person</label>
            <input type="text" id="supplier-contact" class="form-control" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="supplier-email">Email</label>
            <input type="email" id="supplier-email" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="supplier-phone">Phone</label>
            <input type="tel" id="supplier-phone" class="form-control" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="supplier-products">Products Provided</label>
          <textarea id="supplier-products" class="form-control" rows="3" required></textarea>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancel-supplier">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Supplier</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <div class="toast-body"></div>
  </div>
</body>

</html>
