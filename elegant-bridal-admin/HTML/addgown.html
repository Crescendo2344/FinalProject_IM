<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegant Bridal - Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../CSS/admin.css">
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar Navigation -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <i class="fas fa-rings-wedding"></i>
        <h1>ELEGANT BRIDAL</h1>
      </div>
      
      <nav class="sidebar-menu">
        <ul>
          <li><a href="#" class="active"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
          <li class="menu-dropdown">
            <a href="#"><i class="fas fa-tshirt"></i> <span>Gown Management</span></a>
            <ul class="dropdown-content">
              <li><a href="#all-gowns"><i class="fas fa-list"></i> <span>All Gowns</span></a></li>
              <li><a href="#add-gown"><i class="fas fa-plus-circle"></i> <span>Add New Gown</span></a></li>
              <li><a href="#categories"><i class="fas fa-tags"></i> <span>Categories</span></a></li>
              <li><a href="#inventory"><i class="fas fa-boxes"></i> <span>Inventory</span></a></li>
            </ul>
          </li>
          <li><a href="#orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
          <li><a href="#customers"><i class="fas fa-users"></i> <span>Customers</span></a></li>
          <li><a href="#suppliers"><i class="fas fa-truck"></i> <span>Suppliers</span></a></li>
          <li><a href="#reports"><i class="fas fa-chart-bar"></i> <span>Reports</span></a></li>
          <li><a href="#settings"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="admin-main">
      <header class="admin-header">
        <div class="header-left">
          <h2 id="page-title">Dashboard Overview</h2>
          <div class="breadcrumb">
            <a href="#">Home</a> / <span id="breadcrumb-current">Dashboard</span>
          </div>
        </div>
        
        <div class="header-right">
          <div class="search-box">
            <input type="text" placeholder="Search..." id="global-search">
            <i class="fas fa-search"></i>
          </div>
          
          <div class="admin-profile">
            <img src="https://randomuser.me/api/portraits/women/65.jpg" alt="Admin">
            <span>Admin User</span>
            <i class="fas fa-caret-down"></i>
          </div>
        </div>
      </header>
<!-- Add New Gown Content -->
        <div id="add-gown" class="tab-content">
          <div class="content-card">
            <div class="card-header">
              <h3>Add New Gown</h3>
              <a href="#all-gowns" class="btn btn-outline">Back to All Gowns</a>
            </div>
            <form id="gown-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-name">Gown Name</label>
                  <input type="text" id="gown-name" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-category">Category</label>
                  <select id="gown-category" class="form-control" required>
                    <option value="">Select Category</option>
                    <option value="A-line">A-line</option>
                    <option value="Ball Gown">Ball Gown</option>
                    <option value="Mermaid">Mermaid</option>
                    <option value="Sheath">Sheath</option>
                    <option value="Fit-and-flare">Fit-and-flare</option>
                    <option value="Fitted-with-overskirt">Fitted with overskirt</option>
                  </select>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-price">Price (₱)</label>
                  <input type="number" id="gown-price" class="form-control" step="0.01" required>
                </div>
                <div class="form-group">
                  <label for="gown-stock">Stock Quantity</label>
                  <input type="number" id="gown-stock" class="form-control" required>
                </div>
              </div>
              
              <div class="form-group">
                <label for="gown-description">Description</label>
                <textarea id="gown-description" class="form-control" rows="4" required></textarea>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label>Available Sizes</label>
                  <div class="size-options">
                    <label><input type="checkbox" name="size" value="XS"> XS</label>
                    <label><input type="checkbox" name="size" value="S"> S</label>
                    <label><input type="checkbox" name="size" value="M"> M</label>
                    <label><input type="checkbox" name="size" value="L"> L</label>
                    <label><input type="checkbox" name="size" value="XL"> XL</label>
                    <label><input type="checkbox" name="size" value="XXL"> XXL</label>
                  </div>
                </div>
                <div class="form-group">
                  <label>Available Colors</label>
                  <div class="color-options">
                    <div class="color-option">
                      <input type="checkbox" name="color" value="White" id="color-white">
                      <label for="color-white">White</label>
                    </div>
                    <div class="color-option">
                      <input type="checkbox" name="color" value="Ivory" id="color-ivory">
                      <label for="color-ivory">Ivory</label>
                    </div>
                    <div class="color-option">
                      <input type="checkbox" name="color" value="Blush" id="color-blush">
                      <label for="color-blush">Blush</label>
                    </div>
                    <div class="color-option">
                      <input type="checkbox" name="color" value="Champagne" id="color-champagne">
                      <label for="color-champagne">Champagne</label>
                    </div>
                  </div>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-fabric">Fabric</label>
                  <input type="text" id="gown-fabric" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-style">Style</label>
                  <input type="text" id="gown-style" class="form-control" required>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-neckline">Neckline</label>
                  <input type="text" id="gown-neckline" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-sleeve">Sleeve</label>
                  <input type="text" id="gown-sleeve" class="form-control" required>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-back">Back Closure</label>
                  <input type="text" id="gown-back" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-detailing">Detailing</label>
                  <input type="text" id="gown-detailing" class="form-control" required>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-shipping">Shipping</label>
                  <input type="text" id="gown-shipping" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-return">Return Policy</label>
                  <input type="text" id="gown-return" class="form-control" required>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-care">Care Instructions</label>
                  <input type="text" id="gown-care" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-designer">Designer</label>
                  <input type="text" id="gown-designer" class="form-control" required>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-collection">Collection</label>
                  <input type="text" id="gown-collection" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-code">Product Code</label>
                  <input type="text" id="gown-code" class="form-control" required>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="gown-id">Product ID</label>
                  <input type="text" id="gown-id" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="gown-dimensions">Product Dimensions</label>
                  <input type="text" id="gown-dimensions" class="form-control" required>
                </div>
              </div>
              
              <div class="form-group">
                <label for="gown-images">Upload Images</label>
                <div class="image-upload">
                  <input type="file" id="gown-images" multiple accept="image/*">
                  <label for="gown-images" class="btn btn-outline">
                    <i class="fas fa-cloud-upload-alt"></i> Choose Images
                  </label>
                </div>
                <div class="image-preview" id="image-preview"></div>
              </div>
              
              <div class="form-actions">
                <button type="button" class="btn btn-outline" id="cancel-gown">Cancel</button>
                <button type="submit" class="btn btn-primary" id="save-gown">Save Gown</button>
              </div>
            </form>
          </div>
        </div>
     </body>

</html>
